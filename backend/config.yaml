# ==============================================================================
# TubeNote — cấu hình non-secret.
# Secret (API key, cookies) để trong .env.
# ==============================================================================

llm:
  # Provider mặc định. Override bằng env LLM_PROVIDER hoặc UI.
  provider: deepseek

  # ``models`` là list options cho UI dropdown. Model **đầu tiên** = default
  # khi gọi ``make_llm()`` không kèm ``model=``. User pick cụ thể trong UI.

  google:
    models:
      - gemini-3.5-flash
      - gemini-3.1-pro-preview
      - gemini-3-flash-preview
      - gemini-3.1-flash-lite
      - gemini-2.5-flash-lite
      - gemini-2.5-flash
      - gemini-2.5-pro
    temperature: 0.3
    timeout: 120
    max_retries: 2

  openai:
    models:
      - gpt-5.5
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
      - gpt-4o
      - gpt-4o-mini
    temperature: 0.3
    timeout: 120
    max_retries: 2

  deepseek:
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro
    base_url: https://api.deepseek.com
    temperature: 0.2
    timeout: 120
    max_retries: 2

  anthropic:
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5
    temperature: 0.3
    timeout: 120
    max_retries: 2

transcript:
  # Thứ tự ngôn ngữ ưu tiên khi fetch phụ đề.
  default_languages: [vi, en]

cookies:
  # KHÔNG set ở đây để giữ rule "single source of truth" trong .env.
  # Khuyến nghị: YT_COOKIES_BROWSER (đọc thẳng từ trình duyệt đang đăng nhập).
  # dir/single_file chỉ là fallback cho môi trường không có trình duyệt local,
  # bật bằng YT_COOKIES_DIR / YT_COOKIES_PATH trong .env.
  dir: null
  single_file: null


rag:
  # Relevance threshold sau khi normalize cosine distance về [0, 1].
  # Mapping: 1.0 = identical, 0.5 = orthogonal (no relation), 0.0 = opposite.
  # Tune dựa trên embedder thực tế:
  #   - nomic-embed-text-v2-moe: dùng 0.55-0.65 (model này cosine sim hơi conservative)
  #   - bge-m3 / nomic: dùng 0.6-0.7
  similarity_threshold: 0.55
  # Hybrid retrieval pool: mỗi retriever (Dense + BM25) fetch top-N này để fuse.
  # Pool rộng → RRF có cơ hội "cứu" chunks 1 retriever rank thấp nhưng cái kia rank cao.
  fetch_k: 30
  # Sau khi RRF fuse 2 ranking, cap top-N gửi LLM (final_k < fetch_k).
  final_k: 10
  # Nếu KHÔNG chunk nào vượt similarity_threshold → Dense fallback top-N.
  fallback_k: 3

embedding:
  # Local embedding loaded by LangChain/SentenceTransformers.
  # Đổi model bắt buộc xóa data/chroma/* vì dim/vector space thay đổi.
  provider: huggingface
  model: BAAI/bge-m3
  # RAG embedding chạy CPU để không tranh VRAM với Whisper/TTS.
  device: cpu
  normalize: true
  # Model đã được cache local; tránh gọi HF Hub mỗi lần start backend.
  local_files_only: true
web_search:
  # SearXNG self-hosted (Docker). Bật JSON format trong searxng/settings.yml.
  # Setup: `docker run -d -p 8888:8080 --name searxng searxng/searxng`
  enabled: true
  base_url: http://localhost:8888
  # SearXNG đã tự xếp hạng tốt nhất trước -- lấy 3 nguồn đầu, ưu tiên chất
  # lượng/ít nhiễu hơn ưu tiên số lượng (không dùng field "score" của SearXNG
  # để lọc thêm vì chưa xác nhận được thang đo có ổn định giữa các câu hỏi
  # không -- xem comment thảo luận trong lịch sử; nếu cần lọc kỹ hơn, phải đo
  # score thật trước rồi mới quyết ngưỡng).
  max_results: 3
  # Threshold cho "auto" mode: top RAG score < này → call web.
  # 1.0 = identical, 0.5 = orthogonal (no relation), 0.0 = opposite.
  auto_threshold: 0.55

paths:
  audio_dir: data/audio
  video_dir: data/video
  metadata_dir: data/metadata
  subtitles_dir: data/subtitles
  video_sub_dir: data/video_sub
  chroma_dir: data/chroma
  # Glossary người dùng: dạng viết → dạng đọc cho TTS (ví dụ "RAG": "rác").
  glossary_file: data/glossary.json

whisper:
  # STT fallback khi yt-dlp không lấy được subtitle gốc.
  # faster-whisper dùng CTranslate2, nhanh/nhẹ hơn openai-whisper.
  engine: faster
  default_preset: cpu
  # Dựng lại "câu" từ mốc thời gian TỪNG TỪ (word_timestamps) thay vì dùng
  # thẳng ranh giới segment thô của Whisper — Whisper không tách segment
  # theo pause thật nên có thể dính 2 câu làm 1 hoặc lệch mốc đầu/cuối.
  # Preset nào tắt word_timestamps sẽ tự rơi về hành vi cũ (dùng nguyên
  # segment.text/start/end). Xem transcript_whisper.py::_split_into_entries.
  # TRIẾT LÝ NGƯỠNG PAUSE: đây là "máy dò im lặng dài" (ranh giới thật —
  # chuyển cảnh, ngắt đoạn), KHÔNG phải "máy dò nghỉ hơi". Người nói ngập
  # ngừng suy nghĩ NGAY GIỮA câu tới ~1s (đo thật IVmk5D61_3k) — cắt tại đó
  # tạo 2 mảnh câu cụt: dịch mất ngữ cảnh, TTS đọc ngữ điệu kết câu ở chỗ
  # chưa hết ý, nghe cắt quãng khó chịu. Dấu kết câu (.!?) mới là tín hiệu
  # cắt chính; pause chỉ đỡ khi chữ THIẾU dấu chấm (vd manual sub cẩu thả)
  # đứng trước im lặng dài thật (video trên có khoảng lặng 16.7s chuyển
  # cảnh — không có ngưỡng này thì slot câu phủ luôn 16.7s im lặng).
  # Đánh đổi có chủ đích: khoảng nghĩ giữa câu bị nuốt vào slot (dub đọc
  # liền mạch, im lặng dồn về cuối slot) — chấp nhận để đổi câu trọn vẹn.
  sentence_pause_alpha: 1.5    # giây; gap giữa 2 từ >= ngưỡng này -> cắt câu mới
  sentence_max_words: 20        # NGƯỠNG kích hoạt cắt mềm: câu dài hơn sẽ được cắt tại dấu phẩy/liên từ nếu có; KHÔNG cắt cứng theo đếm từ (không có điểm cắt tự nhiên -> giữ nguyên câu dài). Đặt 0 để tắt hẳn tầng này.
  # 4 (trước: 2): lớp bảo vệ thứ 2 độc lập với pause_alpha — chặn thẳng
  # triệu chứng (câu 2-3 từ đứng lẻ) bất kể lần Whisper chạy sạch hay nhiễu.
  sentence_min_words: 4        # câu tách ra ít hơn ngần này từ sẽ tự gộp vào câu liền kề gần hơn về thời gian
  # Ngưỡng pause cho MANUAL SUB (cue caption -> pseudo-words -> cùng bộ máy
  # _split_into_entries). Nới hơn Whisper vì gap giữa cue lẫn cả nhịp hiển
  # thị caption, không chỉ nhịp nói.
  caption_sentence_pause_alpha: 2.0
  # Mode "Ưu tiên câu trọn vẹn" (người dùng chọn ở UI, thay cho cặp số phía
  # trên): tắt HẲN cắt-theo-pause, chỉ còn cắt ở dấu kết câu — mỗi đoạn luôn
  # là 1 câu trọn vẹn dù khoảng lặng giữa chừng dài bao lâu. Đặt 4.0s (thay
  # vì literal "vô hạn") để vẫn có 1 trần chặn tình huống cực đoan (nhạc nền
  # dài không lời, không dấu câu) — không gộp vô hạn không kiểm soát. Dùng
  # chung 1 số cho cả Whisper lẫn caption: ở mức cao này mục đích là "gần như
  # không bao giờ kích hoạt", nên chênh lệch noise giữa 2 nguồn (lý do cặp
  # 1.5/2.0 ở trên khác nhau) không còn ý nghĩa.
  sentence_pause_alpha_complete: 4.0
  caption_sentence_pause_alpha_complete: 4.0
  # cpu_threads: 0 = auto theo số core máy (clamp hardware.max_auto_threads).
  #
  # batch_size / progressive: đã ĐO THẬT bằng scripts/measure_vram.py
  # --whisper-sweep trên RTX 4050 (2 audio thật, 268s + 500s). Bật batch thật
  # (progressive: false -> BatchedInferencePipeline) cho medium.en đạt tốc độ
  # tốt (+42-60%) NHƯNG khi so khớp theo cửa sổ 50s, phát hiện batched pipeline
  # (VAD nội bộ) LÀM MẤT THẬT nội dung nói ở một số đoạn — lệch tới 30-67% số
  # từ trong 1 khung 50s trên audio thứ 2 (không phải re-group vô hại, mà mất
  # hẳn câu nói). large-v3-turbo hầu như không được lợi gì từ batch (+2-4%
  # trên cả 2 audio) nên không đáng đánh đổi. Kết luận: KHÔNG bật batch thật
  # cho preset nào — batch_size giữ 1, progressive giữ true ở mọi preset.
  # Nếu sau này muốn thử lại, PHẢI re-run sweep + so khớp theo cửa sổ thời
  # gian (không chỉ so tổng số từ, vì tổng có thể "trông ổn" do bù trừ) trước
  # khi bật progressive: false cho bất kỳ preset nào.
  presets:
    cpu_tiny:
      label: Whisper - CPU (tiny)
      description: Máy RAM thấp (<4GB); tiny.en + CPU int8, nhanh nhất, kém chính xác nhất.
      engine: faster
      model: tiny.en
      language: en
      device: cpu
      compute_type: int8
      batch_size: 1
      beam_size: 5
      cpu_threads: 0
      num_workers: 2
      progressive: true
      word_timestamps: true
    cpu_base:
      label: Whisper - CPU (base)
      description: Máy RAM 4-6GB; base.en + CPU int8, cân bằng cho máy yếu.
      engine: faster
      model: base.en
      language: en
      device: cpu
      compute_type: int8
      batch_size: 1
      beam_size: 5
      cpu_threads: 0
      num_workers: 2
      progressive: true
      word_timestamps: true
    cpu:
      label: Whisper - CPU
      # Đo thật: x3.1 realtime trên máy 16 core.
      description: Tương thích máy không có GPU.
      engine: faster
      model: small.en
      language: en
      device: cpu
      compute_type: int8
      batch_size: 1
      beam_size: 5
      cpu_threads: 0
      num_workers: 2
      progressive: true
      word_timestamps: true
    cpu_medium:
      label: Whisper - CPU (medium, chậm)
      description: medium.en + CPU int8 — chính xác hơn nhưng chậm hơn nhiều lần; chỉ dành cho ai chấp nhận chờ.
      engine: faster
      model: medium.en
      language: en
      device: cpu
      compute_type: int8
      batch_size: 1
      beam_size: 5
      cpu_threads: 0
      num_workers: 2
      progressive: true
      word_timestamps: true
    gpu_small:
      label: Whisper - GPU (small)
      description: GPU VRAM nhỏ (~1GB), tốc độ nhanh.
      engine: faster
      model: small.en
      language: en
      device: cuda
      compute_type: float16
      batch_size: 1
      beam_size: 5
      progressive: true
      word_timestamps: true
    gpu:
      label: Whisper - GPU
      description: Chất lượng cao, dùng GPU.
      engine: faster
      model: medium.en
      language: en
      device: cuda
      compute_type: float16
      batch_size: 1
      beam_size: 5
      progressive: true
      word_timestamps: true
    gpu_turbo:
      label: Whisper - GPU (turbo, khuyến nghị)
      # Đo thật (RTX 4050): ~2.3GB, x39-43 realtime -- nhanh hơn medium.en dù
      # VRAM chỉ nhỉnh hơn ~0.3GB. large-v3 full chậm hơn nhiều (x14.6,
      # ~3.95GB) mà không có bằng chứng chất lượng tốt hơn -- không đưa vào preset.
      description: Chất lượng cao nhất, nhanh nhất, dùng GPU.
      engine: faster
      model: large-v3-turbo
      language: en
      device: cuda
      compute_type: float16
      batch_size: 1
      beam_size: 5
      progressive: true
      word_timestamps: true
  # Fallback cũ cho openai-whisper nếu đổi engine/preset về "openai".
  vi_model: openai/whisper-large-v3-turbo
  en_model: openai/whisper-large-v3-turbo
  # Vocab hint để giữ acronyms English thay vì transliterate sang VN
  initial_prompt: >-
    Video kỹ thuật về AI, machine learning, prompt engineering.
    Các thuật ngữ thường gặp: LLM, MCP, API, RAG, embedding, prompt,
    vector database, fine-tune, transformer, Claude, Gemini, ChatGPT,
    GPT-4, Llama, OpenAI, Anthropic, Hugging Face, npm, Python, Docker.

translation:
  # Model dịch transcript → tiếng Việt segment-by-segment (giữ timestamps)
  model: gemini-2.5-flash-lite
  # Batch thủ công: copy prompt sang ChatGPT; có thể để lớn vì người dùng tự kiểm tra.
  manual_batch_size: 90
  manual_min_batch_size: 50
  manual_max_batch_size: 150
  # Batch API: nhỏ hơn để giảm lỗi thiếu/thừa dòng khi model trả về.
  api_batch_size: 50
  api_min_batch_size: 50
  api_max_batch_size: 150
  api_max_chars_per_batch: 4000
  api_concurrency: 8
  api_job_timeout_sec: 300

tts:
  # Supertonic voice/model name. Có thể override default bằng env TTS_MODEL.
  # Thêm voice hợp lệ vào đây để frontend hiện trong dropdown.
  default_model: M4
  models:
    - M4
    - F4

  # Tham số tuning riêng cho engine Supertonic (CPU). Trước đây nằm hardcode
  # trong backend/pipeline/dubbing.py::TTS_POLICIES — gom về đây để có 1 nơi
  # duy nhất chỉnh mà không cần sửa code.
  supertonic:
    # Số bước khử nhiễu; UI cho chọn 5/8/12 (nhanh/cân bằng/chất lượng).
    num_step: 8
    # Giới hạn nén WSOLA trước khi chuyển sang ffmpeg atempo (audio_fit.py).
    wsola_limit: 1.05
    # Hệ số an toàn khi tính speed thích ứng theo từng câu
    # (engines/supertonic.py::adaptive_speed). >1 nghĩa là chỉ yêu cầu nói
    # nhanh gần đủ mức cần, phần dư nhường cho WSOLA/atempo.
    speed_alpha: 4.0
    # Gộp segment liền kề nếu tổng ký tự <= giá trị này (0 = không gộp).
    merge_max_chars: 20
    # Tốc độ phát lại cuối cùng của video xuất ra (retime, không phải TTS speed).
    output_speed: 1.15
    # Số thread ONNX Runtime cho Supertonic (intra_op). 0 = auto (ORT tự chọn
    # theo core máy). Model cache global -> đổi giá trị cần restart backend.
    intra_op_threads: 0

  omnivoice:
    # Model checkpoint/Hugging Face repo id. Override bằng env OMNIVOICE_MODEL.
    # Dependency nằm trong requirements.txt; GPU build của PyTorch có thể cần
    # cài riêng theo phần cứng trước khi cài requirements.
    default_model: k2-fsa/OmniVoice
    models:
      - k2-fsa/OmniVoice
    # Số bước khử nhiễu; UI cho chọn 16/24/32/48.
    num_step: 32
    wsola_limit: 1.05
    # Số câu gộp vào 1 lần gọi generate() (throughput GPU).
    # 0 = auto: chọn theo VRAM máy qua bảng hardware.omnivoice_batch_by_vram;
    # gặp CUDA OOM lúc chạy sẽ tự giảm nửa batch rồi thử lại (không chết job).
    batch_size: 0
    # Tắt để dùng thẳng audio thô (debug); mặc định luôn fit về đúng slot.
    fit_audio: true
    # Hệ số an toàn khi tính phần "dư" cộng vào generation_duration
    # (engines/omnivoice.py::_generation_slot_seconds) — thay cho hằng số
    # +3s cũ, giờ tính theo độ dài thật của câu so với slot.
    generation_delta_alpha: 1.2
    # Sàn delta cho câu đã đủ/thưa ngân sách (giây).
    generation_delta_min: 0.3
    merge_max_chars: 0
    output_speed: 1.0
    postprocess_output: false
    budget:
      # Prompt gốc đang dùng [≤N tiếng] với N = duration * source_units_per_sec.
      source_units_per_sec: 6.0
      # Chỉ dùng để hiện gợi ý khoảng dưới trong prompt, không chặn backend.
      min_units_per_sec: 3.2
      # Tốc độ nói tự nhiên dùng để ước tính giây/phần dư (duration_budget.py).
      target_units_per_sec: 4.5
      # Ngưỡng nền trước khi cộng dung sai.
      max_units_per_sec: 5.2
      # Dung sai cộng thêm theo số tiếng tối đa nền.
      tolerance_ratio: 0.4
      # Sàn dung sai cộng thêm, tính theo số tiếng.
      tolerance_min: 3
    voices:
      - id: academic_male
        label: Giọng nam
        reference_audio: voice_clones/omnivoice/academic_male.wav
        reference_text: Trong machine learning, gradient descent là một thuật toán tối ưu hóa được sử dụng để tìm cực tiểu của một hàm mất mát.
      - id: academic_female
        label: Giọng nữ
        reference_audio: voice_clones/omnivoice/academic_female.wav
        reference_text: Trong machine learning, gradient descent là một thuật toán tối ưu hóa được sử dụng để tìm cực tiểu của một hàm mất mát.

# Cắt khoảng lặng khi audio TTS dài hơn slot gốc — dùng chung cho cả 2 engine
# (backend/services/dubbing/audio_fit.py::fit_by_silence, gọi từ fit_to_slot).
audio_fit:
  # Sàn giữ lại cho khoảng lặng KHÔNG được bảo vệ (giây).
  silence_min_pause: 0.04
  # Ngưỡng RMS (dB dưới đỉnh) để coi là khoảng lặng.
  silence_db: -35.0
  # Top N% khoảng lặng DÀI NHẤT được bảo vệ nhiều hơn (khả năng cao là chỗ
  # ngắt câu/dấu phẩy — giữ nhịp thở tự nhiên).
  protect_ratio: 0.3
  # Sàn giữ lại cho nhóm được bảo vệ = silence_min_pause * hệ số này.
  protect_min_pause_multiplier: 3.0
  # Ngưỡng neo điểm bắt đầu/kết thúc tiếng nói thực (active_range_samples) —
  # khác mục đích với silence_db ở trên (đó để CẮT, đây để NEO timing hiển thị).
  active_range_silence_db: -45.0
  active_range_head_ms: 40
  active_range_tail_ms: 180

# Trộn audio dub + nền gốc/background khi mux video cuối cùng
# (backend/services/dubbing/common.py::merge_video_audio).
# Trộn 3 nguồn: GIỌNG DUB (TTS sinh ra) + GIỌNG GỐC (stem vocals của Demucs)
# + NHẠC NỀN (stem no_vocals). Giọng gốc và nhạc nền chỉ tồn tại khi đã tách;
# hai lựa chọn của người dùng (giữ nhạc nền / mức giọng gốc) độc lập nhau.
mix:
  # Chỉ còn là fallback của merge_video_audio khi gọi mà không truyền bed_volume.
  # Luồng dubbing hiện tại luôn truyền tường minh nên không dùng tới.
  original_volume: 0.05
  # Gain giọng dub khi mix KHÔNG có nền nào (bỏ cả nhạc nền lẫn giọng gốc).
  # Lúc đó giọng dub là nội dung duy nhất nên loudnorm cuối quyết định là chính.
  dub_volume_no_background: 1.6
  # Gain nhạc nền khi được giữ. 1.0 = nguyên mức tự nhiên, để giữ đúng quan hệ
  # nhạc/giọng mà tác giả video đã cân sẵn.
  background_volume: 1.0
  # Trim giọng dub khi CÓ tách audio gốc. Lúc này giọng dub đã được chuẩn hoá
  # về ĐÚNG độ to của giọng gốc đo từ stem vocals, nên đây chỉ là nút vặn tinh
  # chỉnh trên nền đó (1.0 = đúng bằng giọng gốc), không phải gain đứng một mình.
  dub_volume_with_background: 1.0
  # Mức giọng gốc nghe được dưới giọng dub, thang 0-100 người dùng kéo ở UI.
  # 0 = bỏ hẳn giọng gốc, 100 = to như trong bản gốc. Đây chỉ là giá trị mặc
  # định khi payload không gửi. LƯU Ý: > 0 thì Demucs phải chạy (thêm vài phút)
  # kể cả khi đã bỏ nhạc nền, vì phải tách mới lấy được giọng gốc ra.
  original_voice_percent: 40
  # Số mũ đường cong percent -> gain (xem MixCfg.original_voice_curve).
  original_voice_curve: 2.0
  # loudnorm (EBU R128) áp lên track đã mix, thay cho peak-clip chỉ hạ không nâng.
  loudnorm_i: -16      # target loudness (LUFS)
  loudnorm_tp: -1.5    # true peak tối đa (dBTP)
  loudnorm_lra: 11     # loudness range cho phép

# Phát hiện phần cứng + đề xuất cấu hình ở màn hình "Tạo lồng tiếng"
# (GET /api/hardware, backend/services/hardware.py). Backend tự đọc RAM
# (/proc/meminfo) và VRAM (torch.cuda) — người dùng không cần biết thông số.
hardware:
  # Người dùng nhập RAM/VRAM ở màn hình "Tạo lồng tiếng" (auto-detect chỉ để
  # pre-fill) -> backend/services/hardware.py::recommend_setup tra các bảng
  # dưới đây để sinh bộ tham số mặc định (ASR model, TTS engine, batch,
  # threads). Muốn calibrate lại: chạy scripts/measure_vram.py trên máy thật
  # rồi sửa ngưỡng ở đây — không cần sửa code.
  #
  # Quy tắc tra bảng chung: lấy dòng có ngưỡng LỚN NHẤT mà giá trị máy >= ngưỡng.

  # ASR theo VRAM (GB). Không đạt dòng nào (hoặc không GPU) -> rơi về bảng CPU.
  # ĐÃ ĐO THẬT (nvidia-smi + scripts/measure_vram.py --whisper-sweep, 2 audio
  # thật 268s/500s, RTX 4050 Laptop):
  # gpu_small (small.en fp16) = 0.71GB thật -> ngưỡng 1.0GB (~40% dư).
  # gpu (medium.en fp16) = 1.96GB thật -> ngưỡng 2.5GB (~28% dư).
  # gpu_turbo (large-v3-turbo fp16) = 2.3GB thật -> ngưỡng 3.0GB (~30% dư).
  #   Nhanh hơn hẳn medium.en (x39-43rt so với x25-35rt) mà VRAM chỉ nhỉnh
  #   hơn ~0.3GB -> ưu tiên hơn "gpu" khi đủ VRAM, không phải chỉ để dự phòng.
  # (Trước đây 2/3.5GB chỉ là đoán, cao hơn thực tế khá nhiều — hạ ngưỡng
  # giúp máy VRAM nhỏ vẫn được dùng ASR tăng tốc GPU thay vì rớt về CPU.)
  asr_gpu_by_vram:
    1.0: gpu_small
    2.5: gpu
    3.0: gpu_turbo
  # ASR CPU theo RAM (GB) — ước lượng TỔNG RAM máy cần có (không phải riêng
  # RAM của model). Ràng buộc thật của CPU là TỐC ĐỘ chứ không phải RAM, nên
  # auto đề xuất tối đa small.en; medium.en CPU (rất chậm, ~240s cho 268s
  # audio — gần bằng thời lượng thật) chỉ nằm trong Nâng cao, không auto.
  #
  # ĐÃ ĐO THẬT: RSS riêng model (tiny/base/small.en int8) lần lượt 1.2/1.3/
  # 1.7GB — chênh lệch giữa các model NHỎ hơn nhiều so với bước 2GB cũ giả
  # định. Cộng thêm baseline backend+frontend idle đo thật ~2.0GB + đệm ~1GB
  # cho OS/trình duyệt (phần này vẫn là ước lượng, tùy máy người dùng thật):
  # tiny/base ~4.2-4.4GB (gần nhau, không cần cách xa), small.en ~4.7GB.
  # Xác nhận lại tốc độ tương đối (16 core, audio 268s): tiny x11.9rt, base
  # x7.4rt, small (cpu mặc định) x3.1rt — vẫn hợp lý để giữ nguyên 3 tier trên.
  asr_cpu_by_ram:
    0: cpu_tiny         # luôn an toàn — mặc định thấp nhất
    3: cpu_base         # ~3GB (dư so với ~4.3GB ước lượng, an toàn hơn)
    5: cpu              # ~5GB (dư so với ~4.7GB ước lượng): small.en int8

  # cpu_medium (medium.en CPU) CỐ Ý không nằm trong bảng trên (không bao giờ
  # auto đề xuất — quá chậm, ~240s cho audio 268s). Nhưng thiếu preset_id ở
  # đó khiến hardware_availability() (xám option trong "Nâng cao") hiểu nhầm
  # là "không giới hạn RAM" — bug thật: RAM=1GB vẫn cho chọn cpu_medium. Cần
  # ngưỡng riêng ở đây để vẫn xám đúng dù không auto đề xuất.
  # Đo thật: cpu_medium 3.5GB RSS + baseline app (~2GB) + đệm OS (~1GB) = 6.5GB.
  asr_cpu_advanced_min_ram_gb:
    cpu_medium: 6.5

  # VRAM (GB) tối thiểu để đề xuất OmniVoice. Đo thật trên RTX 4050 Laptop:
  # dub hết 1 video ổn định ở batch=1 với ~2.5GB VRAM khả dụng; đặt 3.0 để
  # chừa ~500MB đệm (driver/CUDA context/hao hụt khác ngoài lúc đo). Dưới mức
  # này -> rơi về Supertonic CPU.
  omnivoice_min_vram_gb: 3.0
  # Bảng chọn batch_size OmniVoice theo VRAM khi tts.omnivoice.batch_size = 0.
  #
  # ĐÃ ĐO THẬT trên RTX 4050 Laptop 5.6GB: batch lớn hơn 1 KHÔNG nhanh hơn —
  # GPU utilization suốt quá trình đã 100% ngay ở batch=1 (không còn "tay
  # rảnh" để song song hoá), và batch=8 trên data đồng nhất (loại hẳn yếu tố
  # padding) vẫn chậm hơn 8x tuần tự — gộp batch chỉ tốn thêm, không lợi gì.
  #
  # Mọi tier bên dưới ĐANG đặt =1 làm mặc định AN TOÀN, kể cả 12/16GB dù CHƯA
  # đo thật trên GPU đó — nguyên tắc: không có bằng chứng thì không giả định
  # có lợi (bảng cũ từng đoán lạc quan 5.6GB->batch 4, sau đo lại thì sai).
  # GPU mạnh hơn có compute dư thật có thể batch>1 mới có lợi — nhưng phải
  # ĐO bằng scripts/measure_vram.py trên đúng GPU đó rồi mới nâng số ở đây,
  # không suy đoán từ tier dưới lên.
  omnivoice_batch_by_vram:
    3.0: 1
    12: 1
    16: 1
  # Trần số thread khi auto theo số core (whisper cpu_threads=0 và
  # supertonic intra_op_threads=0).
  max_auto_threads: 16
